<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goodbye tension, hello pension</title>
  <style>
    :root{
      --bg:#f5f6f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --accent:#0f766e; /* teal */
      --accent-weak:#e6f3f2;
      --shadow: 0 1px 2px rgba(0,0,0,.04);
      --radius: 10px; /* 不要太圓 */
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background:var(--bg);
      color:var(--text);
    }
    header{
      position: sticky;
      top:0;
      z-index:10;
      background: rgba(245,246,247,.9);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--border);
    }
    .wrap{
      max-width: 880px;
      margin: 0 auto;
      padding: 16px;
    }
    .brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 10px 0;
    }
    .brand h1{
      margin:0;
      font-weight: 300;
      letter-spacing: .2px;
      font-size: 20px;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
      padding: 14px 0 24px;
    }
    @media (min-width: 860px){
      .grid{ grid-template-columns: 1fr 1fr; }
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
    }
    .card h2{
      margin:0 0 10px 0;
      font-size:14px;
      font-weight:600;
      color:var(--text);
      letter-spacing:.2px;
    }
    .sub{
      margin:0 0 12px 0;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    input[type="date"], input[type="text"]{
      width:100%;
      padding:10px 10px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      outline:none;
      font-size:14px;
    }
    input[type="date"]:focus, input[type="text"]:focus{
      border-color: rgba(15,118,110,.45);
      box-shadow: 0 0 0 3px rgba(15,118,110,.10);
    }
    .btn{
      appearance:none;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      font-size:13px;
      line-height:1;
      transition: .12s ease;
      user-select:none;
    }
    .btn:hover{ background:#fafafa; }
    .btn.primary{
      border-color: rgba(15,118,110,.25);
      background: var(--accent);
      color:#fff;
    }
    .btn.primary:hover{ filter: brightness(.98); }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius: 999px;
      background: var(--accent-weak);
      color: var(--accent);
      border: 1px solid rgba(15,118,110,.18);
      font-size:12px;
      font-weight:600;
    }
    .bigNumber{
      font-size: 34px;
      font-weight: 700;
      color: var(--accent);
      line-height:1;
    }
    .muted{ color:var(--muted); font-size:12px; }

    /* Checklist */
    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:10px;
    }
    .item{
      display:grid;
      grid-template-columns: 18px 1fr auto;
      gap:10px;
      align-items:center;
      padding:10px 10px;
      border:1px solid var(--border);
      border-radius: 10px;
      background:#fff;
    }
    .item.dragging{
      opacity:.6;
      background:#f9fafb;
    }
    .title{
      font-size:14px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .title.done{
      color:#9ca3af;
      text-decoration: line-through;
    }
    .actions{
      display:flex;
      align-items:center;
      gap:6px;
    }
    .iconBtn{
      border:1px solid var(--border);
      background:#fff;
      border-radius:10px;
      width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .iconBtn:hover{ background:#fafafa; }
    .handle{
      cursor: grab;
      color:#9ca3af;
      padding:0 6px;
      user-select:none;
      font-size:18px;
      line-height:1;
    }
    .footerNote{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
    }
    .bar{
      width:100%;
      height:10px;
      border-radius:999px;
      background:#eef2f7;
      border:1px solid var(--border);
      overflow:hidden;
    }
    .bar > div{
      height:100%;
      width:0%;
      background: var(--accent);
      transition: width .2s ease;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="brand">
        <h1>Goodbye tension, hello pension</h1>
        <span class="pill" id="progressPill">進度 0%</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">

      <!-- Countdown -->
      <section class="card">
        <h2>離職日期倒數</h2>
        <p class="sub">設定預計離職日期後，會顯示剩餘天數。資料會保存在此裝置。</p>

        <div class="row">
          <div style="flex:1; min-width: 220px;">
            <input id="resignDate" type="date" />
          </div>
          <button class="btn" id="clearDateBtn" type="button">清除日期</button>
        </div>

        <div style="margin-top:14px; display:flex; gap:12px; align-items:baseline;">
          <div class="bigNumber" id="daysLeft">—</div>
          <div class="muted" id="daysLabel">天</div>
        </div>

        <p class="footerNote" id="dateHint">尚未設定日期。</p>
      </section>

      <!-- Checklist -->
      <section class="card">
        <h2>離職準備事項清單（可拖曳排序）</h2>
        <p class="sub">新增/勾選/編輯/刪除皆可，並可拖曳右側把手調整優先順序。</p>

        <div class="row">
          <div style="flex:1; min-width: 220px;">
            <input id="newItemInput" type="text" placeholder="新增準備事項，例如：更新履歷與作品集" />
          </div>
          <button class="btn primary" id="addBtn" type="button">新增</button>
        </div>

        <div style="margin-top:12px;">
          <div class="bar"><div id="progressBar"></div></div>
          <div class="muted" style="margin-top:8px;" id="progressText">已完成 0 / 0</div>
        </div>

        <div class="list" id="list"></div>

        <p class="footerNote">提示：拖曳排序會自動儲存，下次打開仍保留。</p>
      </section>

    </div>
  </main>

  <script>
    // ===== Storage Keys =====
    const KEY_DATE = "gt_hp_resignationDate_v1";
    const KEY_LIST = "gt_hp_checklist_v1";

    // ===== Utils =====
    const $ = (id) => document.getElementById(id);

    function safeJsonParse(str, fallback){
      try { return JSON.parse(str); } catch { return fallback; }
    }

    function todayISO(){
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function calcDaysLeft(isoDate){
      if(!isoDate) return null;
      const target = new Date(isoDate + "T00:00:00");
      const now = new Date();
      const diff = target.getTime() - now.getTime();
      return Math.max(0, Math.ceil(diff / (1000*60*60*24)));
    }

    // ===== Countdown =====
    function loadDate(){
      const saved = localStorage.getItem(KEY_DATE) || "";
      $("resignDate").value = saved;
      renderCountdown(saved);
    }

    function renderCountdown(iso){
      const days = calcDaysLeft(iso);
      if(days === null){
        $("daysLeft").textContent = "—";
        $("dateHint").textContent = "尚未設定日期。";
        $("daysLabel").textContent = "天";
        return;
      }
      $("daysLeft").textContent = String(days);
      $("daysLabel").textContent = "天";
      if(days === 0){
        $("dateHint").textContent = "今天就是你設定的離職日。";
      }else{
        $("dateHint").textContent = `距離 ${iso} 還有 ${days} 天。`;
      }
    }

    $("resignDate").addEventListener("change", (e)=>{
      const iso = e.target.value;
      localStorage.setItem(KEY_DATE, iso);
      renderCountdown(iso);
    });

    $("clearDateBtn").addEventListener("click", ()=>{
      localStorage.removeItem(KEY_DATE);
      $("resignDate").value = "";
      renderCountdown("");
    });

    // ===== Checklist data =====
    let items = [];

    function defaultItems(){
      return [
        { id: cryptoRandomId(), title: "更新履歷與作品集", done: false, createdAt: Date.now() },
        { id: cryptoRandomId(), title: "整理離職原因與職涯目標", done: false, createdAt: Date.now() },
        { id: cryptoRandomId(), title: "盤點存款與緊急預備金", done: false, createdAt: Date.now() },
      ];
    }

    function cryptoRandomId(){
      // fallback if crypto unavailable
      try{
        return crypto.getRandomValues(new Uint32Array(1))[0].toString(16) + Math.random().toString(16).slice(2,6);
      }catch{
        return Math.random().toString(36).slice(2,10);
      }
    }

    function loadList(){
      const raw = localStorage.getItem(KEY_LIST);
      if(raw){
        items = safeJsonParse(raw, defaultItems());
      }else{
        items = defaultItems();
        saveList();
      }
      renderList();
      renderProgress();
    }

    function saveList(){
      localStorage.setItem(KEY_LIST, JSON.stringify(items));
    }

    function renderProgress(){
      const total = items.length;
      const done = items.filter(x=>x.done).length;
      const pct = total === 0 ? 0 : Math.round((done/total)*100);

      $("progressText").textContent = `已完成 ${done} / ${total}`;
      $("progressBar").style.width = pct + "%";
      $("progressPill").textContent = `進度 ${pct}%`;
    }

    function renderList(){
      const list = $("list");
      list.innerHTML = "";

      if(items.length === 0){
        const empty = document.createElement("div");
        empty.className = "muted";
        empty.textContent = "清單目前是空的，先新增一個事項吧。";
        list.appendChild(empty);
        return;
      }

      items.forEach((item, index)=>{
        const row = document.createElement("div");
        row.className = "item";
        row.draggable = true;
        row.dataset.id = item.id;
        row.dataset.index = String(index);

        // Checkbox
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!item.done;
        cb.addEventListener("change", ()=>{
          item.done = cb.checked;
          saveList();
          renderList();
          renderProgress();
        });

        // Title
        const title = document.createElement("div");
        title.className = "title" + (item.done ? " done" : "");
        title.textContent = item.title;

        // Actions
        const actions = document.createElement("div");
        actions.className = "actions";

        const edit = document.createElement("button");
        edit.className = "iconBtn";
        edit.type = "button";
        edit.title = "編輯";
        edit.innerHTML = "✎";
        edit.addEventListener("click", ()=>{
          const next = prompt("編輯事項", item.title);
          if(next === null) return;
          const trimmed = next.trim();
          if(!trimmed) return;
          item.title = trimmed;
          saveList();
          renderList();
        });

        const del = document.createElement("button");
        del.className = "iconBtn";
        del.type = "button";
        del.title = "刪除";
        del.innerHTML = "🗑";
        del.addEventListener("click", ()=>{
          const ok = confirm("確定要刪除這個事項嗎？");
          if(!ok) return;
          items = items.filter(x=>x.id !== item.id);
          saveList();
          renderList();
          renderProgress();
        });

        const handle = document.createElement("span");
        handle.className = "handle";
        handle.title = "拖曳排序";
        handle.textContent = "≡";

        actions.appendChild(edit);
        actions.appendChild(del);
        actions.appendChild(handle);

        row.appendChild(cb);
        row.appendChild(title);
        row.appendChild(actions);

        // Drag events (HTML5)
        row.addEventListener("dragstart", (e)=>{
          row.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", item.id);
        });
        row.addEventListener("dragend", ()=>{
          row.classList.remove("dragging");
        });

        row.addEventListener("dragover", (e)=>{
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
        });

        row.addEventListener("drop", (e)=>{
          e.preventDefault();
          const activeId = e.dataTransfer.getData("text/plain");
          const overId = row.dataset.id;
          if(!activeId || !overId || activeId === overId) return;

          const from = items.findIndex(x=>x.id === activeId);
          const to = items.findIndex(x=>x.id === overId);
          if(from < 0 || to < 0) return;

          const moved = items.splice(from, 1)[0];
          items.splice(to, 0, moved);
          saveList();
          renderList();
        });

        list.appendChild(row);
      });
    }

    // Add item
    $("addBtn").addEventListener("click", ()=>{
      const input = $("newItemInput");
      const title = (input.value || "").trim();
      if(!title) return;

      items.unshift({ id: cryptoRandomId(), title, done:false, createdAt: Date.now() });
      input.value = "";
      saveList();
      renderList();
      renderProgress();
    });

    $("newItemInput").addEventListener("keydown", (e)=>{
      if(e.key === "Enter") $("addBtn").click();
    });

    // Init
    (function init(){
      // default date to empty; show today hint in placeholder
      $("resignDate").setAttribute("min", "2000-01-01");
      $("resignDate").setAttribute("max", "2100-12-31");

      loadDate();
      loadList();
    })();
  </script>
</body>
</html>
