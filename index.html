<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goodbye tension, hello pension</title>
  <meta name="theme-color" content="#0b0b0c" />
  <meta name="description" content="Goodbye tension, hello pension — Sign out points tracker" />
  <style>
    :root{
      --bg:#0b0b0c;
      --panel:#121215;
      --panel2:#16161a;
      --text:#e9e9ee;
      --muted:#a9a9b3;
      --faint:#6d6d78;
      --line:#232329;
      --accent:#e9e9ee; /* neutral */
      --good:#9be28a;
      --warn:#ffd27a;
      --bad:#ff7b7b;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
      --radius2: 12px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    [data-theme="light"]{
      --bg:#f4f4f6;
      --panel:#ffffff;
      --panel2:#fbfbfd;
      --text:#111114;
      --muted:#4a4a57;
      --faint:#7c7c8a;
      --line:#e7e7ee;
      --accent:#111114;
      --shadow: 0 10px 30px rgba(10,10,20,.08);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      background: radial-gradient(1200px 700px at 20% 0%, rgba(255,255,255,.06), transparent 60%),
                  radial-gradient(1000px 700px at 80% 10%, rgba(255,255,255,.04), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    a{color:inherit}
    button, input, textarea, select{font:inherit}
    .app{min-height:100%; display:flex}
    .sidebar{
      width:300px;
      padding:18px;
      border-right:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 45%), var(--panel);
      position:sticky; top:0; height:100vh;
    }
    .brand{
      display:flex; gap:10px; align-items:center; padding:10px 10px 14px;
    }
    .logo{
      width:42px; height:42px; border-radius:14px;
      background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.04));
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--mono);
      letter-spacing:.5px;
      user-select:none;
    }
    .brand h1{
      margin:0;
      font-size:14px;
      line-height:1.2;
      font-weight:650;
    }
    .brand p{margin:2px 0 0; font-size:12px; color:var(--muted)}
    .nav{
      display:flex; flex-direction:column; gap:6px;
      margin-top:10px;
    }
    .nav a{
      text-decoration:none;
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid transparent;
      color:var(--muted);
      background: transparent;
    }
    .nav a.active{
      background: var(--panel2);
      border-color: var(--line);
      color: var(--text);
    }
    .nav a:hover{background:var(--panel2); border-color:var(--line); color:var(--text)}
    .pill{
      font-size:11px; padding:3px 8px; border-radius:999px;
      border:1px solid var(--line); color:var(--muted);
    }
    .sidebar .footer{
      margin-top:auto;
      padding:12px 10px 8px;
      color:var(--faint);
      font-size:12px;
    }
    .sidebar .footer .row{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    .iconbtn{
      border:1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
    }
    .iconbtn:hover{filter:brightness(1.05)}
    .content{flex:1; padding:22px; max-width:1200px}
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      gap:12px;
      margin-bottom:16px;
    }
